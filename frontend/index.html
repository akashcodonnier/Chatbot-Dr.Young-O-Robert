<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>MasterPeace AI Assistant | Dr. Robert Young Research</title>
    <meta name="description" content="AI-powered assistant specializing in Dr. Robert Young's alkaline lifestyle research and MasterPeace products.">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Background Visuals -->
    <div class="bg-visuals">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Top Bar -->
    <header class="topbar glass">
        <div class="topbar-left">
            <div class="topbar-logo">M</div>
            <div class="topbar-info">
                <span class="topbar-title">MasterPeace AI</span>
                <div class="status-pill" id="status-pill">
                    <div class="status-dot"></div>
                    <span class="status-label">Online</span>
                </div>
            </div>
        </div>
        <div class="topbar-right">
            <button class="icon-btn" id="theme-toggle" aria-label="Toggle Theme">
                <span id="theme-icon"></span>
            </button>
            <button class="btn-primary" onclick="location.reload()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span>New Chat</span>
            </button>
        </div>
    </header>

    <!-- Chat Container -->
    <main class="chat-area" id="chatArea">
        <section class="welcome-container" id="welcome">
            <div class="welcome-logo">M</div>
            <h2>Peace of Mind, Naturally.</h2>
            <p></p>
            <div class="suggestions">
                <button class="suggestion-chip" onclick="askSuggestion('What is MasterPeace Zeolite?')">What is MasterPeace Zeolite?</button>
                <button class="suggestion-chip" onclick="askSuggestion('Benefits of alkaline lifestyle')">Benefits of alkaline lifestyle</button>
                <button class="suggestion-chip" onclick="askSuggestion('What is fog water contamination?')">What is fog water?</button>
            </div>
        </section>
    </main>

    <!-- Input Section -->
    <footer class="input-container">
        <div class="input-wrapper">
            <textarea id="question" placeholder="Ask a question..." rows="1" autocomplete="off"></textarea>
            <div class="input-actions">
                <button class="icon-btn" id="mic-btn" aria-label="Voice Input">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"></path><path d="M19 10v2a7 7 0 01-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
                <button class="send-btn" id="send-btn" aria-label="Send Message">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
        <div class="footer">
            Powered by Dr. Robert Young's Research
        </div>
    </footer>

    <script src="/static/script.js"></script>
</body>
</html>
