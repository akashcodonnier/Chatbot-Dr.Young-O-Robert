<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The MasterPeace Company - AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #1a1a1a;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #e0e0e0;
        }

        /* Top Bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid #2a2a2a;
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-title {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 12px;
            font-size: 11px;
            color: #10b981;
            font-weight: 500;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: all 0.2s;
            line-height: 1;
        }

        .menu-btn:hover { background: #2a2a2a; color: #fff; }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
            position: relative;
        }

        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .chat-area::-webkit-scrollbar-thumb:hover { background: #444; }

        /* Welcome Screen */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            background: #2a2a2a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .welcome h2 {
            color: #e0e0e0;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .welcome p {
            color: #777;
            font-size: 14px;
        }

        /* Messages */
        .messages-container {
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            max-width: 100%;
            animation: msgSlide 0.3s ease;
        }

        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            justify-content: flex-end;
        }

        .msg.bot {
            flex-direction: row;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex; 
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
            font-weight: normal;
        }

        .user .avatar {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
        }

        .bot .avatar {
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            color: #e0e0e0;
            border: 1px solid #333;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .avatar:hover {
            transform: scale(1.05);
            transition: transform 0.2s ease;
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
            max-width: fit-content;
            width: auto;
        }

        .msg.user .msg-bubble {
            background: #7c3aed;
            color: #fff;
            border-bottom-right-radius: 4px;
            max-width: 100%;
        }

        .msg.bot .msg-bubble {
            background: #2a2a2a;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
            padding: 16px 18px;
            max-width: 100%;
        }

        .chat-link {
            color: #82aaff;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .chat-link:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        .msg-bubble.error {
            background: #3a1a1a;
            color: #f87171;
        }

        /* Bot Response Formatting */
        .bot-answer {
            line-height: 1.7;
        }

        .msg-time {
            font-size: 10px;
            color: #555;
            margin-top: 4px;
            padding: 0 4px;
        }

        .msg.user .msg-time { text-align: right; }

        /* Typing Indicator */
        .typing {
            align-self: flex-start;
            animation: msgSlide 0.3s ease;
        }

        .typing-dots {
            background: #2a2a2a;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            padding: 14px 18px;
            display: flex;
            gap: 5px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: #555;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 55%, 100% { transform: translateY(0); opacity: 0.4; }
            25% { transform: translateY(-5px); opacity: 1; }
        }

        /* Input Area */
        .input-area {
            padding: 12px 16px 16px;
            background: #1a1a1a;
            flex-shrink: 0;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
        }

        .input-box {
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 18px;
            padding: 8px 16px;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .input-box:focus-within {
            border-color: #7c3aed;
            background: #2d2d2d;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.1);
        }

        #question {
            flex: 1;
            background: transparent;
            border: none;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 14px;
            outline: none;
            resize: none;
            padding: 8px 0;
        }

        #question::placeholder { color: #666; }

        .input-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .input-left {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .action-btn:hover { color: #999; background: #333; }

        .action-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #7c3aed;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        #send-btn:hover:not(:disabled) {
            background: #6d28d9;
            transform: scale(1.05);
        }

        #send-btn:disabled {
            background: #333;
            color: #555;
            cursor: not-allowed;
        }

        #send-btn svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Suggestion Chips */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 24px;
            justify-content: center;
            max-width: 460px;
        }

        .chip {
            padding: 8px 16px;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 20px;
            color: #999;
            font-size: 12.5px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .chip:hover {
            background: #333;
            color: #ccc;
            border-color: #444;
        }

        /* Mic recording state */
        #mic-btn.recording {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.15);
            animation: micPulse 1s infinite;
        }

        @keyframes micPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }

        /* Mobile */
        @media (max-width: 640px) {
            .messages-container { padding: 16px 12px; }
            .msg { max-width: 100%; }
            #question { font-size: 16px; }
            .welcome-icon { width: 56px; height: 56px; font-size: 24px; }
            .welcome h2 { font-size: 18px; }
            .suggestions { gap: 6px; max-width: 320px; }
            .chip { font-size: 12px; padding: 7px 14px; }
            .chat-area::-webkit-scrollbar { display: none; }
            .chat-area { -ms-overflow-style: none; scrollbar-width: none; }
        }

        @media (max-width: 380px) {
            .welcome h2 { font-size: 16px; }
            .welcome p { font-size: 13px; }
            .chip { font-size: 11.5px; }
        }
    </style>
</head>

<body>

<!-- Top Bar -->
<div class="topbar">
    <div class="topbar-left">
        <button class="menu-btn">&#9776;</button>
        <span class="topbar-title">The MasterPeace Company</span>
        <div class="status-pill">
            <div class="status-dot"></div>
            Online
        </div>
    </div>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
        <div class="welcome-icon">👋</div>
        <h2>Welcome to MasterPeace Assistant</h2>
        <p>Your AI-powered assistant for MasterPeace. Ask me anything!</p>
        <div class="suggestions">
            <button class="chip" onclick="askSuggestion(this)">What is MasterPeace Zeolite?</button>
 
            <button class="chip" onclick="askSuggestion(this)">Benefits of alkaline lifestyle</button>
            <button class="chip" onclick="askSuggestion(this)">What is fog water contamination?</button>
        </div>
    </div>
</div>

<!-- Input Area -->
<div class="input-area">
    <div class="input-box">
        <input id="question" placeholder="Message Chat Bot" autocomplete="off" />
        <div class="input-actions">
            <div class="input-left"></div>
            <div class="input-right">
                <!-- Mic -->
                <button class="action-btn" id="mic-btn" title="Voice input">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                        <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </button>
                <!-- Send -->
                <button id="send-btn" title="Send message">
                    <svg viewBox="0 0 24 24">
                        <path d="M22 2L11 13"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
const chatArea = document.getElementById("chatArea");
const questionInput = document.getElementById("question");
const sendBtn = document.getElementById("send-btn");
const conversationId = "conv_" + Date.now();

// Update status text based on activity
function updateStatus(text, isThinking = false) {
    const pill = document.querySelector(".status-pill");
    const dot = document.querySelector(".status-dot");
    pill.innerHTML = `<div class="status-dot ${isThinking ? 'thinking' : ''}"></div> ${text}`;
    
    if (isThinking) {
        pill.style.background = "rgba(124, 58, 237, 0.1)";
        pill.style.color = "#a78bfa";
        document.querySelector(".status-dot").style.background = "#a78bfa";
        document.querySelector(".status-dot").style.boxShadow = "0 0 8px #a78bfa";
    } else {
        pill.style.background = "rgba(16, 185, 129, 0.1)";
        pill.style.color = "#10b981";
        document.querySelector(".status-dot").style.background = "#10b981";
        document.querySelector(".status-dot").style.boxShadow = "0 0 8px #10b981";
    }
}

let messagesContainer = null;

function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function getMessagesContainer() {
    if (!messagesContainer) {
        messagesContainer = document.createElement("div");
        messagesContainer.className = "messages-container";
        chatArea.appendChild(messagesContainer);
    }
    return messagesContainer;
}

function askSuggestion(el) {
    questionInput.value = el.textContent;
    sendMessage();
}

function addMessage(text, sender) {
    const welcome = document.getElementById("welcome");
    if (welcome) welcome.remove();

    const container = getMessagesContainer();

    const msg = document.createElement("div");
    msg.className = `msg ${sender}`;

    // Create avatar with icons
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = sender === "user" ? "👤" : "🤖";

    const bubbleContainer = document.createElement("div");
    bubbleContainer.style.display = "flex";
    bubbleContainer.style.flexDirection = "column";
    bubbleContainer.style.alignItems = sender === "user" ? "flex-end" : "flex-start";
    bubbleContainer.style.maxWidth = "calc(100% - 60px)";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    
    // For user messages, keep as single line
    // For bot messages, convert URLs to clickable links
    if (sender === "user") {
        bubble.textContent = text;
        bubble.style.whiteSpace = "pre-wrap";
        bubble.style.wordBreak = "break-word";
    } else {
        bubble.innerHTML = formatBotResponse(text);
    }

    const time = document.createElement("div");
    time.className = "msg-time";
    time.textContent = getTime();
    time.style.marginTop = "4px";
    time.style.padding = "0 4px";

    bubbleContainer.appendChild(bubble);
    bubbleContainer.appendChild(time);

    if (sender === "user") {
        msg.appendChild(bubbleContainer);
        msg.appendChild(avatar);
    } else {
        msg.appendChild(avatar);
        msg.appendChild(bubbleContainer);
    }
    
    container.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;

    return bubble;
}

function showTyping() {
    const container = getMessagesContainer();

    const typing = document.createElement("div");
    typing.className = "msg bot";
    typing.id = "typing-indicator";

    // Create AI avatar
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "🤖";

    const bubbleContainer = document.createElement("div");
    bubbleContainer.style.display = "flex";
    bubbleContainer.style.flexDirection = "column";
    bubbleContainer.style.alignItems = "flex-start";
    bubbleContainer.style.maxWidth = "calc(100% - 60px)";

    const dots = document.createElement("div");
    dots.className = "typing-dots";
    dots.innerHTML = "<span></span><span></span><span></span>";

    bubbleContainer.appendChild(dots);
    typing.appendChild(avatar);
    typing.appendChild(bubbleContainer);
    container.appendChild(typing);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
    const typing = document.getElementById("typing-indicator");
    if (typing) typing.remove();
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatBotResponse(text) {
    // Preamble stripping is done in backend before streaming
    // Frontend always applies same formatting (no streaming vs done difference)

    // Step 1: Normalize spelling
    text = text.replace(/Zeolité/g, "Zeolite");

    // Step 1b: Separate concatenated URLs (https://a.comhttps://b.com → separate lines)
    text = text.replace(/(https?:\/\/[^\s]+?)(https?:\/\/)/g, '$1\n$2');

    // Step 2: Format lists - add double line breaks before any numbered list starting with 1
    // This handles "text:1." or "text.1." and converts to "text:\n\n1."
    text = text.replace(/([\.:\!\?])\s*(1)\s*[\.\)]\s*/g, '$1\n\n$2. ');

    // Step 2b: For other numbers, just ensure they are on a new line without double gap
    text = text.replace(/([\.:\!\?])\s*(\d+)\s*[\.\)]\s*/g, '$1\n$2. ');

    // Step 2c: Ensure space after numbering (only if digit is at start of line or preceded by whitespace)
    text = text.replace(/(^|\n|\s)(\d+)\s*[\.\)](\S)/g, '$1$2. $3');

    // Step 2d: Bullet point formatting - add double gap before first bullet, single for others
    text = text.replace(/([\.:\!\?])\s*-\s*/g, '$1\n\n- ');

    // Step 3: Split into URL and non-URL segments, make URLs clickable
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    const parts = text.split(urlRegex);
    let htmlResult = "";

    for (let i = 0; i < parts.length; i++) {
        if (parts[i].match(urlRegex)) {
            // It's a URL
            let url = parts[i];
            // Remove trailing punctuation from URL
            const trailingPunct = /[.,!?;:]+$/;
            const match = url.match(trailingPunct);
            let suffix = "";
            if (match) {
                suffix = match[0];
                url = url.replace(trailingPunct, '');
            }
            htmlResult += `<a href="${url}" target="_blank" class="chat-link">${url}</a>${suffix}`;
        } else {
            // It's regular text - escape HTML and handle newlines
            let segment = parts[i];
            segment = segment.replace(/&/g, "&amp;")
                             .replace(/</g, "&lt;")
                             .replace(/>/g, "&gt;")
                             .replace(/"/g, "&quot;")
                             .replace(/'/g, "&#039;");

            // Convert newlines to <br> tags
            htmlResult += segment.replace(/\n/g, '<br>');
        }
    }

    return htmlResult;
}

async function sendMessage() {
    const question = questionInput.value.trim();
    if (!question) return;

    addMessage(question, "user");
    questionInput.value = "";
    sendBtn.disabled = true;
    questionInput.disabled = true;

    showTyping();
    updateStatus("Thinking...", true);

    try {
        const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                question: question,
                conversation_id: conversationId
            })
        });

        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let accumulatedText = "";
        let botBubble = null;

        while (true) {
            const { value, done } = await reader.read();
            const chunk = decoder.decode(value || new Uint8Array(), { stream: !done });
            accumulatedText += chunk;

            // Remove typing dots and create bot bubble only when first text arrives
            if (!botBubble && accumulatedText.trim()) {
                removeTyping();
                botBubble = addMessage("", "bot");
            }

            if (botBubble) {
                botBubble.innerHTML = formatBotResponse(accumulatedText);
                chatArea.scrollTop = chatArea.scrollHeight;
            }

            if (done) break;
        }

        // If stream ended without any text
        if (!botBubble) {
            removeTyping();
            botBubble = addMessage("", "bot");
        }

        if (!accumulatedText.trim()) {
            botBubble.textContent = "No response received. Please try again.";
            botBubble.classList.add("error");
        }
        updateStatus("Online");

    } catch (err) {
        removeTyping();
        updateStatus("Error", false);
        console.error("Fetch error:", err);
        const errorBubble = addMessage(`Error: ${err.message}`, "bot");
        errorBubble.classList.add("error");
    }

    sendBtn.disabled = false;
    questionInput.disabled = false;
    questionInput.focus();
}

sendBtn.addEventListener("click", sendMessage);
questionInput.addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
});

// Voice input using Web Speech API
const micBtn = document.getElementById("mic-btn");
let recognition = null;
let isRecording = false;

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
        isRecording = true;
        micBtn.classList.add("recording");
    };

    recognition.onresult = (event) => {
        let transcript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }
        questionInput.value = transcript;
    };

    recognition.onend = () => {
        isRecording = false;
        micBtn.classList.remove("recording");
    };

    recognition.onerror = (event) => {
        isRecording = false;
        micBtn.classList.remove("recording");
        if (event.error !== 'no-speech') {
            console.error("Speech recognition error:", event.error);
        }
    };

    micBtn.addEventListener("click", () => {
        if (isRecording) {
            recognition.stop();
        } else {
            recognition.start();
        }
    });
} else {
    micBtn.style.display = "none";
}

// Mobile: handle virtual keyboard resize
if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", () => {
        document.body.style.height = window.visualViewport.height + "px";
        chatArea.scrollTop = chatArea.scrollHeight;
    });
}
